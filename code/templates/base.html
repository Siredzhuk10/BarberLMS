<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Barber Academy LMS{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #111827;
      color: #e5e7eb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .navbar {
      background: linear-gradient(90deg, #111827, #1f2937);
      border-bottom: 1px solid rgba(249, 115, 22, 0.5);
    }
    .navbar-brand {
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #f97316 !important;
    }
    .hero {
      background: radial-gradient(circle at top, #1f2937 0, #030712 55%);
      padding: 4rem 0 3rem;
      border-bottom: 1px solid rgba(55, 65, 81, 0.9);
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .25rem .75rem;
      border-radius: 999px;
      border: 1px solid rgba(249, 115, 22, 0.3);
      background: rgba(15, 23, 42, 0.9);
      font-size: .8rem;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: #f97316;
    }
    .hero-title {
      font-size: clamp(2.4rem, 4vw, 3.2rem);
      font-weight: 800;
      margin-top: 1rem;
      margin-bottom: 1rem;
      text-transform: uppercase;
    }
    .accent {
      color: #f97316;
    }
    .course-title {
      color: #fb923c;
    }
    .hero-subtitle {
      color: #d1d5db;
      max-width: 32rem;
    }
    .btn-accent {
      background: linear-gradient(135deg, #f97316, #ea580c);
      border: none;
      color: #0b1120;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .12em;
      font-size: .8rem;
      padding: 0.9rem 1.6rem;
      border-radius: 999px;
    }
    .btn-accent:hover {
      background: linear-gradient(135deg, #fb923c, #f97316);
      color: #020617;
    }
    .tag-pill {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .25rem .9rem;
      border-radius: 999px;
      border: 1px solid rgba(75, 85, 99, 0.9);
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .16em;
      color: #9ca3af;
    }
    .tag-pill-dot {
      width: .5rem;
      height: .5rem;
      border-radius: 999px;
      background: #22c55e;
    }
    .section {
      padding: 3rem 0;
    }
    .section-title {
      font-size: 1.4rem;
      text-transform: uppercase;
      letter-spacing: .16em;
      color: #9ca3af;
      margin-bottom: .75rem;
    }
    .section-heading {
      font-size: 1.9rem;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .card-barber {
      background: radial-gradient(circle at top left, rgba(249, 115, 22, 0.08), #020617);
      border: 1px solid rgba(31, 41, 55, 0.9);
      border-radius: 1.25rem;
      padding: 1.5rem;
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: .5rem;
      box-shadow: 0 22px 45px rgba(15, 23, 42, 0.9);
    }
    .card-barber-price {
      font-size: 1.25rem;
      font-weight: 700;
      color: #f97316;
    }
    .stats-number {
      font-size: 2rem;
      font-weight: 800;
      color: #f8fafc;
      line-height: 1.1;
    }
    .card-barber-meta {
      font-size: .8rem;
      text-transform: uppercase;
      letter-spacing: .16em;
      color: #cbd5e1;
    }
    .badge-outline {
      border-radius: 999px;
      border: 1px solid rgba(55, 65, 81, 0.9);
      padding: .15rem .7rem;
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .14em;
      color: #e5e7eb;
    }
    .text-secondary {
      color: #d1d5db !important;
    }
    footer {
      border-top: 1px solid rgba(31, 41, 55, 0.9);
      padding: 1.5rem 0;
      color: #6b7280;
      font-size: .8rem;
    }
  </style>
  {% block head_extra %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="/">BARBER ACADEMY</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="/">Головна</a></li>
          <li class="nav-item"><a class="nav-link" href="/courses/">Курси</a></li>
          <li class="nav-item"><a class="nav-link" href="/stats/">Статистика</a></li>
          {% if request.user.is_authenticated %}
            <li class="nav-item"><a class="nav-link" href="/account/">Кабінет</a></li>
            <li class="nav-item"><a class="nav-link" href="/logout/">Вийти</a></li>
          {% else %}
            <li class="nav-item"><a class="nav-link" href="/login/">Вхід</a></li>
            <li class="nav-item"><a class="nav-link" href="/register/">Реєстрація</a></li>
          {% endif %}
          <li class="nav-item"><a class="nav-link" href="/admin/">Admin</a></li>
        </ul>
      </div>
    </div>
  </nav>

  {% block content %}{% endblock %}

  <footer>
    <div class="container">
      <span>© Barber Academy LMS, {% now "Y" %}</span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.querySelectorAll(".money").forEach(function (el) {
      var raw = (el.textContent || "").replace(/[^\d.-]/g, "");
      if (!raw) return;
      var value = Number(raw);
      if (Number.isNaN(value)) return;
      el.textContent = new Intl.NumberFormat("uk-UA").format(value);
    });
  </script>
</body>
</html>
